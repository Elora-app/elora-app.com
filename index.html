<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elora — Your Safe Space</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1E1728; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Georgia, serif; padding: 40px 24px; }

  .tagline { font-size: 15px; color: #9B8DC7; text-align: center; line-height: 1.8; max-width: 400px; margin-bottom: 40px; }
  .btn { background: #9B8DC7; color: white; text-decoration: none; padding: 14px 32px; border-radius: 24px; font-size: 13px; font-family: Georgia, serif; font-style: italic; }
  .privacy { margin-top: 24px; font-size: 12px; color: #5C4F8A; text-decoration: none; }

  .center { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="center">
    <img src="1024×1024px.png" alt="Elora logo" />
    <p class="tagline">A private, judgment-free space to write, reflect, and understand yourself — one day at a time.</p>
